<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #121212;
            color: white;
        }

        .card {
            background: #1e1e1e;
            border: none;
            border-radius: 12px;
        }

        .form-control {
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
        }

        .form-control:focus {
            background: #2a2a2a;
            color: white;
            border-color: #0d6efd;
            box-shadow: none;
        }

        .btn-primary {
            border-radius: 8px;
        }

        .container {
            max-width: 600px;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-sm p-4 w-100">

        <h3 class="text-center mb-4 text-white">✏️ Edit Task</h3>

        <form method="POST">

            <label class="form-label text-white-50">Title</label>
            <input type="text"
                   name="title"
                   class="form-control mb-3"
                   value="{{ task.title }}"
                   required>

            <label class="form-label text-white-50">Description</label>
            <textarea name="description"
                      class="form-control mb-4"
                      rows="4"
                      required>{{ task.description }}</textarea>
            <label class="form-label text-white-50">Due Date</label>

            <input type="date"
                    name="due_date"
                    class="form-control mb-4"
                    value="{% if task.due_date %}{{ task.due_date.strftime('%Y-%m-%d')}} {% endif %}">

            <button class="btn btn-primary w-100">
                Save Changes
            </button>

        </form>

        <div class="text-center mt-3">
            <a href="/dashboard" class="text-decoration-none text-white-50">
                ← Back to dashboard
            </a>
        </div>

    </div>

</div>

</body>
</html>
