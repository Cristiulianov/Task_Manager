<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #121212;
            color: white;
        }

        .card {
            background: #1e1e1e;
            border: none;
        }

        .form-control {
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
        }

        .form-control::placeholder {
            color: #bdbdbd;
        }

        .form-control:focus {
            background: #2a2a2a;
            color: white;
            border-color: #0d6efd;
            box-shadow: none;
        }

        a {
            color: #0d6efd;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-sm p-4" style="width: 380px;">

        <h3 class="text-center mb-4 text-white">Register</h3>

        <form method="POST">

            <input class="form-control mb-3"
                   name="username"
                   placeholder="Username"
                   required>

            <input class="form-control mb-3"
                   type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button class="btn btn-success w-100">
                Create Account
            </button>

        </form>

        <div class="text-center mt-3">

            <small class="text-white-50">Already have an account?</small><br>

            <a href="/login">Login here</a>

        </div>

    </div>

</div>

</body>
</html>
